<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Plastic Stress Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --bg: #fdf6f0; --card: #ffffff; --primary: #a8dadc; --accent: #ffb7b2; --text: #4a4e69; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .lab-card { background: var(--card); padding: 1.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        #canvas-container { width: 100%; height: 250px; background: #f8f9fa; border-radius: 16px; margin: 1rem 0; border: 2px dashed #e9ecef; position: relative; overflow: hidden; }
        .slider-group { margin-bottom: 1rem; text-align: left; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        .stats { background: #f1f8f9; padding: 1rem; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; }
        .stat-line span { font-weight: bold; color: #1d3557; }
        .hint { font-size: 0.7rem; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="lab-card">
    <h1>🧪 Bio-Plastic Stress Test</h1>
    <p class="hint">Adjust ingredients, then <b>drag the block</b> to test strength!</p>
    
    <div id="canvas-container"></div>

    <div class="slider-group">
        <label>Glycerin (Elasticity)</label>
        <input type="range" id="glycerin" min="10" max="100" value="30">
    </div>

    <div class="slider-group">
        <label>Starch (Tensile Strength)</label>
        <input type="range" id="starch" min="10" max="100" value="50">
    </div>

    <div class="stats">
        <div class="stat-line">Elasticity: <span id="elasticity-val">0.3</span></div>
        <div class="stat-line">Max Strength: <span id="strength-val">50</span></div>
    </div>
</div>

<script>
    // --- MATTER.JS SETUP ---
    const { Engine, Render, Runner, World, Bodies, MouseConstraint, Mouse, Composite, Constraint } = Matter;
    
    const container = document.getElementById('canvas-container');
    const engine = Engine.create();
    const render = Render.create({
        element: container,
        engine: engine,
        options: {
            width: 450,
            height: 250,
            wireframes: false,
            background: 'transparent'
        }
    });

    // Create the "Bioplastic" Block
    let plastic = Bodies.rectangle(225, 125, 100, 40, { 
        render: { fillStyle: '#ffb7b2' },
        frictionAir: 0.05
    });

    // Anchor it to the left side so it stretches
    let anchor = Constraint.create({
        pointA: { x: 100, y: 125 },
        bodyB: plastic,
        pointB: { x: -50, y: 0 },
        stiffness: 0.1,
        render: { strokeStyle: '#dfdfdf', lineWidth: 2 }
    });

    // Mouse control
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });

    World.add(engine.world, [plastic, anchor, mouseConstraint]);
    Render.run(render);
    Runner.run(Runner.create(), engine);

    // --- LOGIC & INPUTS ---
    const starchInput = document.getElementById('starch');
    const glycerinInput = document.getElementById('glycerin');
    
    let isSnapped = false;

    function updateLogic() {
        const starch = parseInt(starchInput.value);
        const glycerin = parseInt(glycerinInput.value);
        
        // Relationship: Glycerin increases stretch (stiffness lowered)
        // Starch increases max tensile strength
        anchor.stiffness = 0.5 / (glycerin / 10);
        document.getElementById('elasticity-val').innerText = (glycerin / 100).toFixed(2);
        document.getElementById('strength-val').innerText = starch;

        // Reset if they change sliders
        if (isSnapped) resetPlastic();
    }

    function resetPlastic() {
        World.remove(engine.world, plastic);
        plastic = Bodies.rectangle(225, 125, 100, 40, { render: { fillStyle: '#ffb7b2' } });
        anchor.bodyB = plastic;
        World.add(engine.world, plastic);
        isSnapped = false;
    }

    // The Stress Test Function
    Matter.Events.on(engine, 'afterUpdate', function() {
        if (isSnapped) return;

        // Calculate how far the plastic has been pulled from the anchor
        const distance = Math.sqrt(
            Math.pow(plastic.position.x - anchor.pointA.x, 2) + 
            Math.pow(plastic.position.y - anchor.pointA.y, 2)
        );

        const maxStrength = parseInt(starchInput.value) + 50; // Threshold

        if (distance > maxStrength) {
            snap();
        }
    });

    function snap() {
        isSnapped = true;
        anchor.bodyB = null; // Break the connection!
        
        // Play Snap Sound (Using Browser Synthesis since we don't have an mp3 file)
        const osc = engine.world.context ? null : new (window.AudioContext || window.webkitAudioContext)();
        if (osc) {
            const o = osc.createOscillator();
            const g = osc.createGain();
            o.connect(g);
            g.connect(osc.destination);
            o.start(0);
            g.gain.exponentialRampToValueAtTime(0.00001, osc.currentTime + 0.1);
            o.stop(osc.currentTime + 0.1);
        }
        
        alert("Snap! The tensile strength was exceeded.");
    }

    [starchInput, glycerinInput].forEach(i => i.addEventListener('input', updateLogic));
    updateLogic();
</script>

</body>
</html>
